services:
  postgres:
    image: postgres:15-alpine
    container_name: citizen_on_petrol_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5500:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - citizen_on_petrol_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: citizen_on_petrol_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@citizen-on-petrol.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - citizen_on_petrol_network
    depends_on:
      - postgres
    restart: unless-stopped

  migration:
    build:
      context: .
      target: dev
    env_file:
      - .env
    volumes:
      - ./src/migrations:/app/src/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - citizen_on_petrol_network
    profiles:
      - migration

  api:
    build:
      context: .
      target: builder
    command: node dist/main.js
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - citizen_on_petrol_network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - citizen_on_petrol_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  citizen_on_petrol_network:
    driver: bridge
